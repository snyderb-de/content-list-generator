<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Content List Generator Dashboard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Project Dashboard</p>
        <h1 id="project-title">Content List Generator</h1>
        <p id="project-summary" class="hero-copy"></p>
        <div id="project-stats" class="stat-grid"></div>
      </header>

      <main class="dashboard">
        <section class="panel wide">
          <div class="panel-header">
            <h2>Overview</h2>
            <p id="last-updated" class="muted"></p>
          </div>
          <div id="overview-grid" class="info-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Tools And Features</h2>
          </div>
          <div id="tools-grid" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Architecture</h2>
          </div>
          <div id="architecture-grid" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Documentation</h2>
          </div>
          <div id="docs-list" class="link-list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Open Issues</h2>
          </div>
          <div id="issues-list" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Limitations</h2>
          </div>
          <div id="limitations-list" class="stack"></div>
        </section>

        <section class="panel wide">
          <div class="panel-header">
            <h2>Dependencies</h2>
          </div>
          <div id="dependencies-grid" class="info-grid"></div>
        </section>

        <section class="panel wide">
          <div class="panel-header">
            <h2>Recent Changes</h2>
          </div>
          <div id="changes-list" class="timeline"></div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
